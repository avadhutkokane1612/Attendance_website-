
<!DOCTYPE html>
<html>
<head>
  <title>View Attendance</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

<h2>Attendance Records</h2>

<table border="1" id="table">
  <tr>
    <th>Roll Number</th>
    <th>Student Name</th>
    <th>Date</th>
    <th>Status</th>
  </tr>
</table>

<script>
let data = localStorage.getItem("attendance");

if (data) {
  document.getElementById("table").innerHTML = data;
}
</script>

</body>
</html>
