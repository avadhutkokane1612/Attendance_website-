<script>
function saveAttendance() {
  let name = document.getElementById("name").value;

  let data = JSON.parse(localStorage.getItem("attendance")) || [];

  data.push(name);

  localStorage.setItem("attendance", JSON.stringify(data));

  alert("Saved!");
}
</script>
